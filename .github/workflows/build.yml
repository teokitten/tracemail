name: Build Tracemail binary
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build binary (ubuntu:20.04 / glibc 2.31)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/src" \
            -w /src \
            ubuntu:20.04 \
            bash -c "
              export DEBIAN_FRONTEND=noninteractive && \
              apt-get update -q && \
              apt-get install -y software-properties-common curl gnupg && \
              mkdir -p /etc/apt/keyrings && \
              curl -fsSL 'https://keyserver.ubuntu.com/pks/lookup?op=get&search=0xBA6932366A755776' \
                | gpg --dearmor -o /etc/apt/keyrings/deadsnakes.gpg && \
              echo 'deb [signed-by=/etc/apt/keyrings/deadsnakes.gpg] https://ppa.launchpadcontent.net/deadsnakes/ppa/ubuntu focal main' \
                > /etc/apt/sources.list.d/deadsnakes.list && \
              apt-get update -q && \
              apt-get install -y python3.11 python3.11-dev python3.11-venv && \
              curl -sS https://bootstrap.pypa.io/get-pip.py | python3.11 && \
              python3.11 -m pip install -r requirements.txt pyinstaller && \
              python3.11 -m PyInstaller --onefile --name tracemail \
                --add-data 'templates:templates' app.py
            "
      - name: Download linuxdeploy
        run: |
          curl -fsSL -o linuxdeploy https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy
      - name: Build AppImage
        run: |
          mkdir -p AppDir/usr/bin AppDir/usr/share/icons/hicolor/256x256/apps
          cp dist/tracemail AppDir/usr/bin/tracemail
          cp tracemail.png AppDir/usr/share/icons/hicolor/256x256/apps/tracemail.png
          ./linuxdeploy --appdir AppDir \
            --desktop-file tracemail.desktop \
            --output appimage
      - name: Get short SHA
        id: sha
        run: echo "short=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_OUTPUT
      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v-${{ steps.sha.outputs.short }}
          name: Tracemail ${{ steps.sha.outputs.short }}
          files: Tracemail-x86_64.AppImage
          token: ${{ secrets.GITHUB_TOKEN }}
