name: Build Tracemail binary

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller flask PyPDF2 python-docx reportlab

      - name: Build binary
        run: |
          pyinstaller --onefile --name tracemail \
            --add-data "templates:templates" \
            app.py

      - name: Get short SHA
        id: sha
        run: echo "short=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Upload release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v-${{ steps.sha.outputs.short }}
          name: Tracemail ${{ steps.sha.outputs.short }}
          files: dist/tracemail
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
